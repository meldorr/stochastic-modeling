# Physics-aware fPCA + DDPM pipeline for aircraft landing trajectories.
# Everything the pipeline needs is here; no paths are hardcoded in the source.

seed: 42
device: auto            # auto -> mps > cuda > cpu

paths:
  # Source data: a `traffic` library Traffic object (pickle), 14k Zurich landings,
  # each already exactly 200 timesteps up to the Final Approach Fix (…tilFAF).
  raw_pkl: /Users/meldor/Desktop/git/deep-traffic-generation-paper/data/traffic_noga_tilFAF_train.pkl
  processed: data/processed.npz          # Stage-1 cache (arrays + FAF anchors + meta)
  checkpoint: checkpoints/pipeline.pt    # fPCA basis + scalers + DDPM weights + config
  generated: results/generated.parquet
  results_dir: results

data:
  # Feature channels the model operates on, in this order.
  # x, y are projected position (UTM metres) -> reconstruction is identity, no dead-reckoning.
  features: [x, y, altitude, timedelta]
  # Only used if 'track' is among features (unwrapped avoids the 0/360 jump).
  track_column: track_unwrapped
  anchor_index: -1        # FAF anchor = last point of each flight (…tilFAF)
  seq_len: 200
  train_ratio: 0.9
  resample: time          # 'time' = keep native 200-pt grid (guard only). 'arclength' also implemented.

fpca:
  basis: discrete            # bspline (Jarry: cubic spline + roughness penalty) | discrete
  explained_variance:
    default: 0.99
    track: 0.99
  max_components: 200         # hard cap per feature (safety)
  bspline:
    n_basis: 40              # cubic B-spline coefficients per curve (caps reconstruction detail)
    degree: 3               # cubic
    smoothing: 1.0e-3       # Sobolev W^2 roughness penalty weight (∫ f''^2)

ddpm:
  timesteps: 1000
  schedule: cosine           # cosine | linear
  cosine_s: 0.008
  beta_start: 1.0e-4         # linear schedule only
  beta_end: 2.0e-2
  sample_clamp: 10.0         # clamp latent each reverse step (~10 sigma; stabilizes sampling)

denoiser:
  hidden_dim: 256
  n_blocks: 4
  time_dim: 128
  dropout: 0.0

tcn_denoiser:
  channels: 64
  n_blocks: 8
  kernel_size: 3
  dilations: [1, 2, 4, 8]
  time_dim: 128
  dropout: 0.0

unet_denoiser:
  hidden_dim: 256
  depth: 3
  channel_mult: [1, 2, 4]
  blocks_per_level: 2
  time_dim: 128
  dropout: 0.0

training:
  epochs: 1200
  batch_size: 256
  lr: 5.0e-4          # peak LR (reached after warmup)
  lr_init: 1.0e-5     # warmup starting LR
  lr_min: 1.0e-6      # final LR after cosine decay
  warmup_epochs: 100
  weight_decay: 0.0001
  ema_decay: 0.999
  grad_clip: 1.0
  num_workers: 0
  val_every: 25

logging:
  tensorboard_dir: runs     # `tensorboard --logdir runs` to view
  log_every: 25             # training steps between scalar logs
  enabled: true

generate:
  n_samples: 2000
  physics_repair: true       # clip decoded features to data bounds, enforce monotone timedelta
  physics_reject: true       # redraw latents whose decoded trajectory violates bounds
  reject_max_tries: 5
  cluster_mix: null          # per-cluster mode: null = sample by real frequency; else {0: w0, 1: w1, ...}

evaluate:
  n_real: 2000
  n_gen: 2000

cluster:
  enabled: true           # true -> train one fPCA+DDPM per cluster; false -> single global model
  basis: xy_flat          # xy_fpca (fpca-then-cluster) | xy_flat (cluster raw x/y)
  features: [x, y]        # channels to cluster on (x/y = spatial approach shape)
  method: kmeans          # kmeans | gmm | hdbscan
  k: 5                    # chosen cluster count (ARI peak ~ known flows; see cluster_ksweep.png)
  k_sweep: [2, 3, 4, 5, 6, 7, 8]
  stride: 4               # time subsampling for xy_flat
  hdbscan_min: 200        # HDBSCAN min_cluster_size (reference run)
  compare_bases: true     # also sweep xy_flat for the comparison table
  labels_out: results/cluster_labels.npz
